name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: E2E against Postal 3.3.7
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # KEEP=1 leaves the stack running so the failure step below can dump
      # its logs — the runner is ephemeral, so nothing leaks.
      - name: Run the E2E suite (spins up Postal + MariaDB + Mailpit)
        run: KEEP=1 ./e2e/run.sh

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f e2e/docker-compose.yml logs --tail 200
